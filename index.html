<!DOCTYPE html>
<html>
<head>
  <title>CareerPilot AI</title>

  <style>
    body {
      background: #0f172a;
      font-family: Arial;
      color: white;
      display: flex;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .chat-container {
      width: 450px;
      display: flex;
      flex-direction: column;
      margin-top: 40px;
    }

    .chat-box {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      height: 400px;
      overflow-y: auto;
      margin-bottom: 10px;
    }

    .user, .bot {
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
      max-width: 80%;
    }

    .user {
      background: #38bdf8;
      color: black;
      margin-left: auto;
    }

    .bot {
      background: #334155;
    }

    .input-area {
      display: flex;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 12px;
      margin-left: 5px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: black;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="chat-container">
  <h2>🤖 CareerPilot AI</h2>

  <div class="chat-box" id="chat"></div>

  <div class="input-area">
    <input type="text" id="query" placeholder="Ask anything...">
    <button onclick="askAI()">Send</button>
  </div>
</div>

<script>
async function askAI() {
  let query = document.getElementById("query").value;

  let chat = document.getElementById("chat");

  // User message
  chat.innerHTML += `<div class="user">${query}</div>`;

  let res = await fetch("https://careerpilot-ai-cng5.onrender.com/ask", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ query: query })
  });

  let data = await res.json();

  // Bot response
  chat.innerHTML += `<div class="bot">${data.answer}</div>`;

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
